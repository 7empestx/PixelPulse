; PlatformIO Project Configuration — PixelPulse
; ESP32-DevKitC V4 + HUB75 64x32 RGB LED Matrix

[platformio]
; Exclude test-only native env from default `pio run` build
default_envs = esp32dev, esp32dev-ota, qemu

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
extra_scripts = pre:scripts/load_secrets.py

; Partition scheme with SPIFFS for sprite storage
board_build.partitions = default.csv
board_build.filesystem = spiffs

lib_deps =
    mrfaptastic/ESP32 HUB75 LED Matrix Panel DMA Display@^3.0.0
    adafruit/Adafruit GFX Library@^1.11.0
    adafruit/Adafruit BusIO@^1.14.0
    tzapu/WiFiManager@^2.0.0
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM=0

; OTA upload over WiFi (after first USB flash)
[env:esp32dev-ota]
extends = env:esp32dev
upload_protocol = espota
upload_port = pixelpulse.local

; Native tests — runs on host machine, no hardware needed
; Use `pio test -e native` only — excluded from default `pio run` build
[env:native]
platform = native
test_framework = unity
lib_deps =
build_flags = -std=c++17
lib_extra_dirs = lib

; QEMU emulation build — skips HUB75 DMA init, uses serial output
[env:qemu]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
extra_scripts = pre:scripts/load_secrets.py

board_build.partitions = default.csv
board_build.filesystem = spiffs

lib_deps =
    mrfaptastic/ESP32 HUB75 LED Matrix Panel DMA Display@^3.0.0
    adafruit/Adafruit GFX Library@^1.11.0
    adafruit/Adafruit BusIO@^1.14.0
    tzapu/WiFiManager@^2.0.0
    bblanchon/ArduinoJson@^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM=0
    -DQEMU_BUILD
